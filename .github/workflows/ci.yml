name: CI

on:
  push:
    branches: [master, "feat/**", "fix/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run tests
        run: bats test/*.bats
